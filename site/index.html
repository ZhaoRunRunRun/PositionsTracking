<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positions Tracking</title>
    <meta name="description" content="科技风投资人持仓追踪看板，追踪 13F 持仓、季度变化与 10 年历史趋势。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero shell">
      <div>
        <p class="eyebrow">13F INTELLIGENCE BOARD</p>
        <h1>著名投资人物持仓雷达</h1>
        <p class="lede">以饼状图快速识别每位投资人的核心仓位，点击人物即可弹出持仓明细表，结合 10 年回溯轨迹看清组合演化。</p>
      </div>
      <div class="hero-panel">
        <div class="stat-pill"><span>追踪跨度</span><strong id="yearsBack">10Y</strong></div>
        <div class="stat-pill"><span>跟踪投资人</span><strong id="investorCount">--</strong></div>
        <div class="stat-pill"><span>最后更新</span><strong id="generatedAt">--</strong></div>
      </div>
    </header>

    <main class="shell">
      <section class="section dashboard-stack">
        <div class="panel stage-panel">
          <div class="section-head compact">
            <h2>人物选择台</h2>
            <p>中文 + English 展示，点谁就看谁的持仓切片。</p>
          </div>
          <div id="investorGrid" class="investor-grid"></div>
        </div>
        <div class="panel spotlight-panel">
          <div class="section-head compact">
            <h2>组合饼状图</h2>
            <p id="pieSubtitle">显示当前人物前 12 大持仓占比。</p>
          </div>
          <div class="spotlight-grid">
            <div class="pie-stage">
              <canvas id="donutChart" width="520" height="520"></canvas>
              <div class="pie-center">
                <p id="centerQuarter" class="eyebrow"></p>
                <h3 id="centerName"></h3>
                <strong id="centerValue"></strong>
                <button id="openModalButton" class="glow-button">查看详细持仓</button>
              </div>
            </div>
            <div>
              <div class="legend-head">
                <h3>组分明细</h3>
                <p>右侧逐项展示该组合中每个仓位的权重与市值。</p>
              </div>
              <div id="legendList" class="legend-list legend-panel"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="section analytics-stack">
        <div class="panel">
          <div class="section-head compact">
            <h2>资金异动聚焦</h2>
            <p>筛出最显著的增持、减持、新进与清仓。</p>
          </div>
          <div id="changesList" class="changes-list"></div>
        </div>
        <div class="panel">
          <div class="section-head compact">
            <h2>10 年趋势曲线</h2>
            <p>看组合价值如何穿越不同市场周期。</p>
          </div>
          <div class="chart-wrap chart-panel">
            <canvas id="timelineChart" width="640" height="320"></canvas>
          </div>
        </div>
      </section>

      <section id="errorsSection" class="section hidden">
        <div class="panel warning-panel">
          <div class="section-head compact">
            <h2>抓取告警</h2>
            <p>以下对象本轮更新失败，页面仍会显示已成功的数据。</p>
          </div>
          <div id="errorsList"></div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal hidden" aria-hidden="true">
      <div id="modalBackdrop" class="modal-backdrop"></div>
      <div class="modal-panel">
        <button id="closeModalButton" class="modal-close" aria-label="关闭">×</button>
        <div class="modal-head">
          <div>
            <p id="modalEntity" class="eyebrow"></p>
            <h2 id="modalName"></h2>
            <p id="modalQuarter" class="modal-sub"></p>
          </div>
          <div class="modal-metrics">
            <span>组合市值</span>
            <strong id="modalValue"></strong>
          </div>
        </div>
        <div id="modalTable" class="modal-table"></div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
